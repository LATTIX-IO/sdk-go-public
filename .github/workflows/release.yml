name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v* tag to rehearse or republish release notes for
        required: true
        type: string

permissions:
  contents: write

env:
  PUBLIC_MIRROR_REPO: LATTIX-IO/sdk-go-public

jobs:
  verify-sdk-rust-release:
    runs-on: ubuntu-latest
    steps:
      - name: Verify matching sdk-rust public mirror release exists
        uses: actions/github-script@v7
        with:
          script: |
            const ref = context.ref || '';
            const fallbackTag = context.payload.inputs?.tag || '';
            const tag = ref.startsWith('refs/tags/') ? ref.replace('refs/tags/', '') : fallbackTag;
            if (!tag) {
              core.setFailed('No release tag was provided. Push a v* tag or provide one through workflow_dispatch inputs.');
              return;
            }
            await github.rest.repos.getReleaseByTag({
              owner: 'LATTIX-IO',
              repo: 'sdk-rust-public',
              tag,
            });

  publish-release:
    needs: verify-sdk-rust-release
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve tag name
        id: tag
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag || '' }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            echo "tag_name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          generate_release_notes: true
          files: |
            install-native.sh
            install-native.ps1
          fail_on_unmatched_files: true
          prerelease: ${{ contains(steps.tag.outputs.tag_name, '-') }}

  public-mirror-release:
    needs:
      - verify-sdk-rust-release
      - publish-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_PAT_TOKEN: ${{ secrets.GH_PAT }}
      INPUT_TAG: ${{ github.event.inputs.tag || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            echo "tag_name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify GH_PAT is configured
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${GH_PAT_TOKEN:-}" ]]; then
            echo "::error::GH_PAT secret is not configured for sdk-go public mirroring." >&2
            exit 1
          fi

      - name: Configure git identity
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync repository contents to public mirror
        shell: bash
        env:
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
        run: |
          set -euo pipefail
          mirror_dir="$(mktemp -d)"
          trap 'rm -rf "${mirror_dir}"' EXIT

          git clone "https://x-access-token:${GH_PAT_TOKEN}@github.com/${PUBLIC_MIRROR_REPO}.git" "${mirror_dir}"
          rsync -a --delete \
            --exclude '.git/' \
            --exclude 'target/' \
            --exclude 'dist/' \
            ./ "${mirror_dir}/"

          pushd "${mirror_dir}" >/dev/null
          if [[ -n "$(git status --porcelain)" ]]; then
            git add -A
            git commit -m "Mirror ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
            git push origin HEAD:main
          else
            git push origin HEAD:main
          fi

          git tag -f "${TAG_NAME}"
          git push origin "refs/tags/${TAG_NAME}" --force
          popd >/dev/null

      - name: Publish mirrored GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
        run: |
          set -euo pipefail
          prerelease_flag=()
          if [[ "${TAG_NAME}" == *-* ]]; then
            prerelease_flag+=(--prerelease)
          fi

          if gh release view "${TAG_NAME}" --repo "${PUBLIC_MIRROR_REPO}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" install-native.sh install-native.ps1 --repo "${PUBLIC_MIRROR_REPO}" --clobber
          else
            gh release create "${TAG_NAME}" install-native.sh install-native.ps1 --repo "${PUBLIC_MIRROR_REPO}" --generate-notes "${prerelease_flag[@]}"
          fi
