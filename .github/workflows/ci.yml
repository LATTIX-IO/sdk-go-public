name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_integration_full_composed:
        description: Run the shared integration-full scenario against a composed environment
        required: false
        type: boolean
        default: false
      integration_full_base_url:
        description: Base URL for the composed integration-full target
        required: false
        type: string
      integration_full_tenant_id:
        description: Optional tenant ID header for the composed integration-full target
        required: false
        type: string
      integration_full_user_id:
        description: Optional user ID header for the composed integration-full target
        required: false
        type: string
      integration_full_bearer_token_secret_name:
        description: Secret name that stores the bearer token for the composed integration-full target
        required: false
        type: string

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      SDK_API_E2E_INTEGRATION_FULL_MANIFEST_PATH: ${{ github.workspace }}/prop-system-tests/fixtures/sdk_api_e2e/integration_full_manifest.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout shared integration fixtures
        uses: actions/checkout@v4
        with:
          repository: LATTIX-IO/prop-system-tests
          ref: feat/sdk-api-e2e-shared-fixture-20260510
          path: prop-system-tests
          token: ${{ secrets.GH_PAT }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        shell: bash
        run: |
          set -euo pipefail
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Run shared integration-full contract tests
        run: go test ./... -run 'TestLoadIntegrationFullManifest|TestRunIntegrationFullScenarioWithClient' -count=1

      - name: Run tests
        run: |
          go test ./...
          go vet ./...
          go build ./...

  integration-full-composed:
    if: github.event_name == 'workflow_dispatch' && inputs.run_integration_full_composed
    runs-on: ubuntu-latest
    env:
      SDK_API_E2E_INTEGRATION_FULL_MANIFEST_PATH: ${{ github.workspace }}/prop-system-tests/fixtures/sdk_api_e2e/integration_full_manifest.json
      SDK_API_E2E_INTEGRATION_FULL_BASE_URL: ${{ inputs.integration_full_base_url }}
      SDK_API_E2E_INTEGRATION_FULL_BEARER_TOKEN: ${{ secrets[inputs.integration_full_bearer_token_secret_name] }}
      SDK_API_E2E_INTEGRATION_FULL_TENANT_ID: ${{ inputs.integration_full_tenant_id }}
      SDK_API_E2E_INTEGRATION_FULL_USER_ID: ${{ inputs.integration_full_user_id }}
      SDK_API_E2E_INTEGRATION_FULL_ARTIFACT_DIR: ${{ github.workspace }}/output/sdk_go_integration_full/${{ github.run_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout shared integration fixtures
        uses: actions/checkout@v4
        with:
          repository: LATTIX-IO/prop-system-tests
          ref: feat/sdk-api-e2e-shared-fixture-20260510
          path: prop-system-tests
          token: ${{ secrets.GH_PAT }}

      - name: Checkout sdk-rust source repository
        uses: actions/checkout@v4
        with:
          repository: LATTIX-IO/sdk-rust
          path: sdk-rust
          token: ${{ secrets.GH_PAT }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust native library
        working-directory: sdk-rust
        run: cargo build --release

      - name: Validate composed runner configuration
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${SDK_API_E2E_INTEGRATION_FULL_BASE_URL:-}" ]; then
            echo "::error::SDK_API_E2E_INTEGRATION_FULL_BASE_URL is required" >&2
            exit 1
          fi
          if [ -z "${{ inputs.integration_full_bearer_token_secret_name }}" ]; then
            echo "::warning::No bearer token secret name was provided; the composed run will proceed without an Authorization header."
          fi

      - name: Run shared integration-full scenario against composed environment
        env:
          CGO_CFLAGS: -I${{ github.workspace }}/sdk-rust/include
          CGO_LDFLAGS: -L${{ github.workspace }}/sdk-rust/target/release
          LD_LIBRARY_PATH: ${{ github.workspace }}/sdk-rust/target/release
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/sdk-rust/target/release
        run: go test ./... -run TestRunIntegrationFullScenarioAgainstComposedEnvironment -count=1 -v

      - name: Upload composed runner artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sdk-go-integration-full-composed-${{ github.run_id }}
          path: ${{ env.SDK_API_E2E_INTEGRATION_FULL_ARTIFACT_DIR }}
          if-no-files-found: ignore

  native-bindings:
    name: Native bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout sdk-go
        uses: actions/checkout@v4

      - name: Checkout sdk-rust source repository
        id: checkout_sdk_rust
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: LATTIX-IO/sdk-rust
          path: sdk-rust

      - name: Determine native bindings availability
        id: native_bindings_gate
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.checkout_sdk_rust.outcome }}" == "success" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping native bindings checks because sdk-rust source repository is not accessible from this workflow context."
          fi

      - name: Set up Go
        if: ${{ steps.native_bindings_gate.outputs.enabled == 'true' }}
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Rust
        if: ${{ steps.native_bindings_gate.outputs.enabled == 'true' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust native library
        if: ${{ steps.native_bindings_gate.outputs.enabled == 'true' }}
        working-directory: sdk-rust
        run: cargo build --release

      - name: Run rustbindings tests (Windows)
        if: runner.os == 'Windows' && steps.native_bindings_gate.outputs.enabled == 'true'
        env:
          LATTIX_SDK_RUST_LIB: ${{ github.workspace }}\sdk-rust\target\release\sdk_rust.dll
        run: |
          go test -tags rustbindings ./...
          go build -tags rustbindings ./...

      - name: Run rustbindings tests (Unix)
        if: runner.os != 'Windows' && steps.native_bindings_gate.outputs.enabled == 'true'
        env:
          CGO_CFLAGS: -I${{ github.workspace }}/sdk-rust/include
          CGO_LDFLAGS: -L${{ github.workspace }}/sdk-rust/target/release
          LD_LIBRARY_PATH: ${{ github.workspace }}/sdk-rust/target/release
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/sdk-rust/target/release
        run: |
          go test -tags rustbindings ./...
          go build -tags rustbindings ./...

      - name: Native bindings checks skipped
        if: ${{ steps.native_bindings_gate.outputs.enabled != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Native bindings checks were intentionally skipped for this run due to unavailable sdk-rust repository access."
